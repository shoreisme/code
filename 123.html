			<h2>Rick Sanchez（由贾斯汀·罗兰配音） - 一个奇怪和酗酒的 疯狂科学家，他是Beth/贝丝的父亲，Jerry/杰瑞的岳父，以及Morty/莫蒂和Summer/夏末的外公。他不负责任的性格导致Beth和Jerry担心他们儿子Morty的安全。这个设定经常在Rick的主角时间线上--主角时间线的Rick在说话时常常在说话时打嗝，并表现出各种精神疾病的临床诊断特征。这个特立独行的人物将他的时间视为至宝：他总是避免常规的人生经历，比如学校、婚姻甚至爱情。他对Morty及其家人向他提出的平凡的要求表示鄙视或无聊，并表明了对Jerry的鄙夷，然而，有几集中，Rick也表现出他孤独的一面。</h2>
